name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyCUBAK7wEhVotT3kkz8KklbavzL3CG3jf0"
          VITE_FIREBASE_AUTH_DOMAIN: "arre-app-dev.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "arre-app-dev"
          VITE_FIREBASE_STORAGE_BUCKET: "arre-app-dev.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "428395068609"
          VITE_FIREBASE_APP_ID: "1:428395068609:web:cdadc4f41a25064cf2e840"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARRE_APP_DEV }}"
          channelId: live
          projectId: arre-app-dev
