name: CI / E2E Tests with AI QA Agent

on:
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch depth 0 to ensure we have history to generate a git diff against main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        run: cd functions && npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Set up Java 21 (Required for Firebase Emulators)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # Using 'continue-on-error: true' ensures the workflow doesn't completely stop here if tests fail.
      # We want the next step (AI Agent) to run right after.
      # Alternatively, use 'if: failure()' on the subsequent steps.
      - name: Run Playwright tests
        id: playwright
        run: CI=true npx firebase emulators:exec "npx playwright test --project=chromium" --project demo-test
        continue-on-error: true
        env:
          VITE_FIREBASE_API_KEY: "demo-api-key"
          VITE_FIREBASE_AUTH_DOMAIN: "demo-test.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "demo-test"
          VITE_FIREBASE_STORAGE_BUCKET: "demo-test.appspot.com"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Run AI QA Agent
        if: failure() && steps.playwright.outcome == 'failure'
        run: node scripts/qa-agent.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          COMMIT_SHA: ${{ github.sha }}
          TEST_REPORT_PATH: "test-results.json"

      # Finally, if playwright failed, we should still fail the job overall
      # so the PR is blocked from merging.
      - name: Check overall test status
        if: always()
        run: |
          if [ "${{ steps.playwright.outcome }}" == "failure" ]; then
            exit 1
          fi
